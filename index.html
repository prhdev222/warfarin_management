<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warfarin Dose Planner</title>
    <meta name="description" content="คำนวณขนาดยา Warfarin อัตโนมัติ กระจาย dose สม่ำเสมอ นับเม็ดยา" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0D1B2A;
        font-family: "Sarabun", "Noto Sans Thai", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 18px;
        line-height: 1.7;
        color: #E0E8F0;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      @page {
        size: A4;
        margin: 12mm;
      }

      @media print {
        body {
          background: #ffffff;
          color: #000000;
        }
        #root {
          background: #ffffff;
        }
        .no-print {
          display: none !important;
        }
        .print-page {
          box-shadow: none !important;
          background: #ffffff !important;
          color: #000000 !important;
        }
        .print-page * {
          background: transparent !important;
          box-shadow: none !important;
        }
        .print-page a {
          color: #000000 !important;
          text-decoration: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
